<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        input {
            display: block;
        }

        button {
            display: block;
        }
    </style>
    <link rel="stylesheet" href="/styles/styleregistration.css">
</head>

<body>

    
    <div class="form-box">
        <form action="#">
            <button class="close-btn">x</button>

            <h1>
                <span>Login</span>
                <span>|</span>
                <span style="color: green">Register</span>
            </h1>

            <p style="text-align: center">Enter your email and password to register</p>
                <input type="text" placeholder="User name" class="input-field">
                <input type="email" placeholder="Enter your email address" class="input-field">
                <input type="password" placeholder="Password" class="input-field" required
                       pattern="(?=.*[A-Z]).{8,}"
                       title="Пароль повинен містити щонайменше 8 символів та одну велику літеру">
                <input type="password" placeholder="Confirm Password" class="input-field">

                <button type="submit" class="register-button">Register</button>
                <p style="text-align: center">---------Or register with--------</p>

                <button class="button">Continue with Google</button>
                <button class="button">Continue with Facebook</button>

            </form>

        </div>


</body>

</html>
